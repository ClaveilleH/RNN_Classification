<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <title>Digit AI | Analyse Proba</title>
    
    <link rel="stylesheet" href="/static/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/static/script.js" defer></script>
  </head>

  <body>
    <div class="header">
      <h1>Digit AI</h1>
      <p>Analyse de probabilités par pixel</p>
    </div>

    <div class="main-card">
      <div>
        <div class="config-section">
          <label for="apiUrl">URL de l'API Predict</label>
          <!-- http://rnn.dokpoly.claveille.fr/predict -->
          <!-- <input type="text" id="apiUrl" class="url-input" value="http://127.0.0.1:5000/predict" placeholder="https://votre-api.com/predict"> -->
          <input type="text" id="apiUrl" class="url-input" value="http://rnn.dokpoly.claveille.fr/predict" placeholder="https://votre-api.com/predict">
        </div>

        <div class="canvas-container">
          <canvas id="canvas" width="280" height="280"></canvas>
          <div id="grid-overlay"></div>
        </div>
        <div class="button-group">
          <button onclick="clearCanvas()">Effacer</button>
          <button class="btn-primary" onclick="predict()">Analyser</button>
        </div>
      </div>

      <div class="analysis-section">
        <div id="status" class="result-badge">Prêt</div>
        <div class="chart-wrapper">
          <canvas id="probChart"></canvas>
        </div>
      </div>
    </div>

  </body>
</html>
